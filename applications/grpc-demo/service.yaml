apiVersion: v1
kind: Service
metadata:
  name: grpc-demo
  namespace: applications
spec:
  selector:
    app.kubernetes.io/name: grpc-demo
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP
